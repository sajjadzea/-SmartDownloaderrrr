name: SmartDownloader - SecureZIP Mode

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (با فاصله جدا کن)'
        required: true
      mode:
        description: 'normal یا zip'
        required: false
        default: 'normal'

jobs:
  ultra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y curl aria2 zip

      - name: Prepare workspace
        run: mkdir -p downloads

      - name: Smart Download Engine
        run: |
          URLS="${{ github.event.inputs.urls }}"
          echo "🔗 Links: $URLS"
          cd downloads
          for LINK in $URLS; do
            echo "⬇️ Downloading: $LINK"
            if [[ "$LINK" =~ "pytorch.org" || "$LINK" =~ "huggingface.co" || "$LINK" =~ "googleusercontent" ]]; then
              curl -L --retry 10 --retry-delay 10 -O "$LINK"
            else
              aria2c -x 16 -s 16 "$LINK"
            fi
          done
          cd ..

      - name: Commit & Push (SecureZIP fallback)
        if: always()
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          du -sh downloads || true
          SIZE_MB=$(du -sm downloads | cut -f1)
          echo "Total: ${SIZE_MB}MB"

          # مرحله‌ی معمول
          git add downloads || true
          git commit -m "🚀 Auto-add downloads" || echo "Nothing to commit"
          git pull origin main --rebase || echo "No rebase"
          git push origin main || (
            echo "⚠️ Push failed or repo too large — running SecureZIP fallback"
            mkdir -p /tmp/sdzip
           ....................................................................................................................................................................................................................................................................................................................................... main --force
          )

      - name: Finish
        run: echo "✅ SecureZIP mode run complete."
